<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <!-- [security L1] Demo CSP - hiprint 内部使用 new Function() 渲染 formatter / styler,
         必须放行 'unsafe-eval'. 业务方应按需自行收紧 (信任边界见 docs/SECURITY.md).
         data: 给 image element base64. blob: 给 jsPDF preview. -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*; frame-src 'self' blob:; object-src 'none'; base-uri 'self';" />
    <link rel="icon" href="/vue3-print/favicon.ico" />
    <title>vue3-print</title>
    <!-- hiprint 拖拽图标需要 -->
    <link href="/vue3-print/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" media="print" href="/vue3-print/css/print-lock.css" />
    <style>
      #loading-mask{position:fixed;left:0;top:0;height:100%;width:100%;background:#fff;user-select:none;z-index:9999;overflow:hidden}
      .loading-wrapper{position:absolute;top:50%;left:50%;text-align:center;transform:translate(-50%,-100%)}
      .loading-tips{margin-top:10px;color:grey;font-size:14px}
      .loading-dot{animation:antRotate 1.2s infinite linear;transform:rotate(45deg);position:relative;display:inline-block;font-size:40px;width:40px;height:40px;box-sizing:border-box}
      .loading-dot i{width:20px;height:20px;position:absolute;display:block;background-color:#1890ff;border-radius:100%;transform:scale(.75);transform-origin:50% 50%;opacity:.3;animation:antSpinMove 1s infinite linear alternate}
      .loading-dot i:nth-child(1){top:0;left:0}
      .loading-dot i:nth-child(2){top:0;right:0;animation-delay:.4s}
      .loading-dot i:nth-child(3){right:0;bottom:0;animation-delay:.8s}
      .loading-dot i:nth-child(4){bottom:0;left:0;animation-delay:1.2s}
      @keyframes antRotate{to{transform:rotate(405deg)}}
      @keyframes antSpinMove{to{opacity:1}}
    </style>
    <script type="module" crossorigin src="/vue3-print/static/index-BuLU7ENI.js"></script>
    <link rel="modulepreload" crossorigin href="/vue3-print/static/rolldown-runtime-aKtaBQYM.js">
    <link rel="modulepreload" crossorigin href="/vue3-print/static/vendor-BeUbDQrX.js">
    <link rel="modulepreload" crossorigin href="/vue3-print/static/vendor-print-B73cyNX7.js">
    <link rel="modulepreload" crossorigin href="/vue3-print/static/vendor-antdv-DcaDu6SZ.js">
    <link rel="modulepreload" crossorigin href="/vue3-print/static/vendor-vue-kl2QNABO.js">
    <link rel="modulepreload" crossorigin href="/vue3-print/static/vendor-code-CthIFJrJ.js">
    <link rel="stylesheet" crossorigin href="/vue3-print/static/vendor-antdv-B6VCboLO.css">
    <link rel="stylesheet" crossorigin href="/vue3-print/static/index-Dl9jeHbC.css">
  </head>
  <body>
    <noscript>
      <strong>vue3-print 需要启用 JavaScript 才能正常运行。</strong>
    </noscript>
    <div id="app">
      <div id="loading-mask">
        <div class="loading-wrapper">
          <span class="loading-dot loading-dot-spin"><i></i><i></i><i></i><i></i></span>
          <div class="loading-tips">初次加载较慢，请耐心等待...</div>
        </div>
      </div>
    </div>
  </body>
</html>
